<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>录音分析工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-pet" id="headerPet"></div>
      <h1>录音分析工具</h1>
      <p>批量转写录音，智能分析文本内容</p>
    </header>

    <!-- File Selection Card -->
    <div class="card" id="selectCard">
      <h2 class="card-title">
        <span>📂</span>
        <span>选择要处理的录音</span>
      </h2>

      <div class="folder-info">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
        <span>监控文件夹:</span>
        <code id="folderPath">加载中...</code>
      </div>

      <!-- Loading State -->
      <div class="loading" id="loadingState">
        <div class="loading-spinner"></div>
        <div>正在加载文件列表...</div>
      </div>

      <!-- Empty State -->
      <div class="empty-state hidden" id="emptyState">
        <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
        <div>文件夹中没有找到音频文件</div>
        <div style="font-size: 0.875rem; margin-top: 8px;">支持格式: MP3, WAV, M4A, FLAC</div>
      </div>

      <!-- File List -->
      <div class="file-list hidden" id="fileList"></div>

      <!-- Select Actions -->
      <div class="select-actions hidden" id="selectActions">
        <button class="btn btn-sm btn-secondary" id="selectAllBtn">全选</button>
        <button class="btn btn-sm btn-secondary" id="selectNoneBtn">取消全选</button>
        <span class="selected-count">
          已选择: <strong id="selectedCount">0</strong> 个文件
        </span>
      </div>

      <!-- Batch Actions -->
      <div class="batch-actions">
        <button class="btn btn-primary" id="startBatchBtn" disabled>
          <span>▶</span>
          <span>开始处理 (<span id="btnCount">0</span>)</span>
        </button>
        <button class="btn btn-secondary" id="refreshBtn">
          <span>🔄</span>
          <span>刷新列表</span>
        </button>
      </div>

      <!-- Error Message -->
      <div class="error-message hidden" id="errorMessage"></div>
    </div>

    <!-- Progress Card -->
    <div class="card hidden" id="progressCard">
      <h2 class="card-title">
        <span>⚡</span>
        <span>正在处理</span>
      </h2>

      <!-- 进度宠物 -->
      <div class="progress-pet" id="progressPet"></div>

      <div class="progress-header">
        <div class="progress-stats">
          <div class="progress-stat">
            <div class="progress-stat-value" id="progressCurrent">0</div>
            <div class="progress-stat-label">当前进度</div>
          </div>
          <div class="progress-stat">
            <div class="progress-stat-value" id="progressTotal">0</div>
            <div class="progress-stat-label">总文件数</div>
          </div>
          <div class="progress-stat">
            <div class="progress-stat-value" id="progressCompleted">0</div>
            <div class="progress-stat-label">已完成</div>
          </div>
          <div class="progress-stat">
            <div class="progress-stat-value" id="progressFailed">0</div>
            <div class="progress-stat-label">失败</div>
          </div>
        </div>
      </div>

      <div class="overall-progress">
        <div class="overall-progress-header">
          <span class="overall-progress-label" id="currentFileName">-</span>
          <span class="overall-progress-percent" id="overallPercent">0%</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="overallProgressBar" style="width: 0%"></div>
        </div>
        <div class="progress-time">
          <span id="timeElapsed">已用时: 0秒</span>
          <span id="timeRemaining">预计剩余: 计算中...</span>
        </div>
      </div>

      <div class="file-list" id="progressFileList"></div>
    </div>

    <!-- Result Card -->
    <div class="card hidden" id="resultCard">
      <h2 class="card-title">
        <span>✨</span>
        <span>处理完成</span>
      </h2>

      <div class="result-stats">
        <div class="stat-item">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">总文件数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statCompleted">0</div>
          <div class="stat-label">成功</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statFailed">0</div>
          <div class="stat-label">失败</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statTotalDuration">-</div>
          <div class="stat-label">总时长 (秒)</div>
        </div>
      </div>

      <div class="file-list" id="resultFileList"></div>

      <div class="batch-actions">
        <button class="btn btn-success" id="openReportsBtn">
          <span>📂</span>
          <span>打开报告</span>
        </button>
        <button class="btn btn-secondary" id="restartBtn">
          <span>↩</span>
          <span>继续处理</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/pet-icons.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
